<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth • SwimScorePro</title>
  <link rel="stylesheet" href="../src/css/tokens.css">
  <link rel="stylesheet" href="../src/css/base.css">
  <link rel="stylesheet" href="../src/css/layout.css">
</head>
<body data-page="login">
  <!-- Skip Link for Accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Browser Chrome (Wireframe Simulation) -->
  <div class="browser-chrome no-print">
    <div class="window-controls">
      <span class="window-control-dot close"></span>
      <span class="window-control-dot minimize"></span>
      <span class="window-control-dot maximize"></span>
    </div>
    <div class="url-bar">
      <span class="padlock-icon">🔒</span>
      <span>secure.swimscore.pro/auth/login</span>
    </div>
  </div>

  <!-- Main Content -->
  <main id="main-content" class="login-container">
    <div class="login-card card">
      <!-- Login Header -->
      <header class="login-header">
        <span class="warning-icon" aria-hidden="true">▲</span>
        <div>
          <h1 class="page-title" style="font-size: 20px;">System Authentication</h1>
          <p class="text-metadata" style="font-size: 12px;">Authorized personnel only</p>
        </div>
      </header>

      <!-- Error Region (ARIA Live) -->
      <div id="login-error-region" class="input-error-message hidden" role="alert" aria-live="polite"></div>

      <!-- Lockout Message -->
      <div id="lockout-message" class="banner banner-warn hidden" role="alert">
        Account locked. Try again in <span class="countdown mono">15:00</span>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="login-form" role="form" aria-labelledby="login-header">
        <!-- Email Field -->
        <div class="form-group">
          <label class="input-label" for="login-email">EMAIL/USERNAME</label>
          <input
            type="email"
            id="login-email"
            class="input"
            placeholder="admin.sys@swimscore.pro"
            autocomplete="username"
            aria-label="Email or username"
            required
          >
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="input-label" for="login-password">PASSWORD</label>
          <div class="flex items-center gap-sm">
            <input
              type="password"
              id="login-password"
              class="input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              style="flex: 1;"
            >
            <button
              type="button"
              id="password-toggle"
              class="icon-btn"
              aria-label="Toggle password visibility"
              style="border: 1px solid var(--color-border-primary); border-radius: var(--radius-sm);"
            >
              👁
            </button>
          </div>
        </div>

        <!-- MFA Section -->
        <div class="mfa-section">
          <label class="input-label">Multi-Factor Authentication</label>
          <p class="text-metadata" style="font-size: 12px; margin-bottom: 8px;">Enter OTP Code</p>
          
          <div id="otp-container" class="otp-container" role="group" aria-label="One-time password, 6 digits">
            <!-- OTP inputs will be generated by JavaScript -->
          </div>

          <!-- OTP Countdown -->
          <div class="otp-countdown mono" aria-live="polite">Q02:45</div>

          <!-- Resend Code Link -->
          <a href="#" id="resend-code-link" class="resend-link disabled" aria-disabled="true">Resend Code (30s)</a>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="login-submit"
          class="btn btn-primary btn-full"
          disabled
        >
          VERIFY & LOGIN →
        </button>
      </form>

      <!-- Footer -->
      <footer class="login-footer">
        <p class="keyboard-hint">Press Ctrl+Enter to submit</p>
        <p class="security-badge" aria-label="Connection secured with TLS 1.3">🔒 SECURE CONNECTION</p>
      </footer>
    </div>
  </main>

  <!-- Session Warning Modal -->
  <div id="session-warning-modal" class="modal-overlay hidden" role="dialog" aria-labelledby="session-warning-title">
    <div class="modal">
      <h2 id="session-warning-title" class="modal-header">Session Expiring Soon</h2>
      <p class="text-secondary">Your session will expire in <span class="countdown mono">05:00</span></p>
      <div class="modal-footer">
        <button class="btn" onclick="SecurityManager.logout()">Logout</button>
        <button class="btn btn-primary" onclick="SecurityManager.extendSession()">Extend Session</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="../src/js/app.js"></script>
</body>
</html>
